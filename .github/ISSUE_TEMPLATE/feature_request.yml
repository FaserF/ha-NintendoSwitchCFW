name: Feature Request
description: Suggest an idea for the Nintendo Switch CFW integration
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!

        Before submitting, please check:
        - 📋 [Existing feature requests](https://github.com/FaserF/ha-NintendoSwitchCFW/issues?q=is%3Aissue+label%3Aenhancement)
        - 📖 [Documentation](https://github.com/FaserF/ha-NintendoSwitchCFW/blob/master/README.md)

  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem? Please describe.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - CFW version tracking (Atmosphere/Hekate)
        - Switch firmware update notifications
        - sys-botbase connectivity
        - Sensor / entity improvements
        - Multiple Switch support
        - Configuration / options
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false